<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qalam Aggregate Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 antialiased text-gray-800">

    <div class="max-w-4xl w-full mx-auto space-y-8">
        <!-- Header -->
        <div class="text-center space-y-2">
            <h1 class="text-3xl md:text-5xl font-bold tracking-tight text-gray-900">Aggregate Calculator</h1>
            <p class="text-gray-500">Calculate and compare NUST Qalam aggregates easily.</p>
        </div>

        <!-- Main Card -->
        <div class="glass shadow-2xl rounded-2xl p-6 md:p-8">
            <form id="calcForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">

                <!-- User 1 -->
                <div class="space-y-4">
                    <h2 class="text-xl font-semibold text-blue-600 border-b pb-2">Your Credentials</h2>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Username</label>
                        <input type="text" id="username1" required placeholder="e.g. smthn.bese23seecs"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 px-4 py-2 border bg-white/50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Password</label>
                        <input type="password" id="password1" required placeholder="••••••••"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 px-4 py-2 border bg-white/50">
                    </div>
                </div>

                <!-- User 2 (Optional) -->
                <div class="space-y-4">
                    <h2 class="text-xl font-semibold text-purple-600 border-b pb-2">Compare Profile (Optional)</h2>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Competitor Username</label>
                        <input type="text" id="username2" placeholder="e.g. other.bese23seecs"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-purple-500 focus:ring-purple-500 px-4 py-2 border bg-white/50">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Competitor Password</label>
                        <input type="password" id="password2" placeholder="••••••••"
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-purple-500 focus:ring-purple-500 px-4 py-2 border bg-white/50">
                    </div>
                </div>

                <div class="md:col-span-2 mt-4">
                    <button type="submit" id="submitBtn"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200">
                        <span id="btnText">Calculate Aggregates</span>
                        <div id="btnLoader" class="loader hidden ml-2"></div>
                    </button>
                    <p id="errorMsg" class="mt-2 text-sm text-red-600 text-center hidden"></p>
                </div>
            </form>
        </div>

        <!-- Results Section -->
        <div id="resultsContainer" class="hidden space-y-6">
            <h2 class="text-2xl font-bold text-gray-900 border-b pb-2">Results</h2>
            <div id="coursesList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Data will be injected here -->
            </div>
        </div>

    </div>

    <script>
        document.getElementById('calcForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const resultsContainer = document.getElementById('resultsContainer');
            const coursesList = document.getElementById('coursesList');

            // Reset UI
            errorMsg.classList.add('hidden');
            resultsContainer.classList.add('hidden');
            coursesList.innerHTML = '';
            submitBtn.disabled = true;
            btnText.textContent = 'Crunching Numbers...';
            btnLoader.classList.remove('hidden');

            const payload = {
                username_1: document.getElementById('username1').value,
                password_1: document.getElementById('password1').value,
                username_2: document.getElementById('username2').value || '',
                password_2: document.getElementById('password2').value || ''
            };

            try {
                const response = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const rawText = await response.text();
                let data;
                try {
                    data = JSON.parse(rawText);
                } catch (err) {
                    throw new Error("Received an HTML response instead of JSON. Ensure you are running this through 'vercel dev' or the deployed Vercel URL, and not just a standard static server (like Live Server).");
                }

                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to calculate aggregates');
                }

                data.results.forEach(course => {
                    const hasPeer = Object.keys(course.user2.lecture || {}).length > 0 || Object.keys(course.user2.lab || {}).length > 0;
                    const ch = course.credits;

                    const getCombined = (lecture, lab, credits) => {
                        const lectVal = lecture || 0;
                        const labVal = lab || 0;
                        if (credits === 0) return 0;
                        return (lectVal * (credits - 1) / credits) + (labVal * 1 / credits);
                    };

                    let html = `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow">
                            <div class="bg-blue-50 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                                <h3 class="font-semibold text-blue-900 truncate pr-2">${course.name}</h3>
                                <span class="bg-blue-200 text-blue-800 text-xs px-2 py-1 rounded-full font-medium whitespace-nowrap">${ch} credit hours</span>
                            </div>
                            <div class="p-4 space-y-4">
                    `;

                    // Lecture stats
                    let yourLectAgg = 0, yourLectClass = 0, otherLectClass = 0;
                    if (course.user1.lecture && course.user1.lecture.agg !== undefined) {
                        yourLectAgg = course.user1.lecture.agg;
                        yourLectClass = course.user1.lecture.class_avg;
                        html += `
                            <div>
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-700">Your Lecture: <span class="font-bold text-gray-900">${yourLectAgg.toFixed(2)}</span> <span class="text-gray-500">(Avg: ${yourLectClass.toFixed(2)})</span></span>
                                </div>`;
                        if (hasPeer && course.user2.lecture && course.user2.lecture.class_avg !== undefined) {
                            otherLectClass = course.user2.lecture.class_avg;
                            html += `
                                <div class="flex justify-between text-sm mt-1">
                                    <span class="text-gray-600">Other Lecture Avg: <span class="font-medium">${otherLectClass.toFixed(2)}</span></span>
                                </div>`;
                        }
                        html += `</div>`;
                    }

                    // Lab stats
                    let yourLabAgg = 0, yourLabClass = 0, otherLabClass = 0;
                    const hasLab = course.user1.lab && course.user1.lab.agg !== undefined;
                    if (hasLab) {
                        yourLabAgg = course.user1.lab.agg;
                        yourLabClass = course.user1.lab.class_avg;
                        html += `
                            <div class="pt-2 border-t border-gray-100">
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-700">Your Lab: <span class="font-bold text-gray-900">${yourLabAgg.toFixed(2)}</span> <span class="text-gray-500">(Avg: ${yourLabClass.toFixed(2)})</span></span>
                                </div>`;
                        if (hasPeer && course.user2.lab && course.user2.lab.class_avg !== undefined) {
                            otherLabClass = course.user2.lab.class_avg;
                            html += `
                                <div class="flex justify-between text-sm mt-1">
                                    <span class="text-gray-600">Other Lab Avg: <span class="font-medium">${otherLabClass.toFixed(2)}</span></span>
                                </div>`;
                        }
                        html += `</div>`;
                    }

                    html += `<div class="pt-3 mt-3 border-t border-gray-200">`;

                    if (hasLab) {
                        const yourCombined = getCombined(yourLectAgg, yourLabAgg, ch);
                        const yourCombinedClass = getCombined(yourLectClass, yourLabClass, ch);
                        html += `
                                <div class="flex justify-between text-sm text-blue-900 bg-blue-50 p-2 rounded">
                                    <span>Your Combined: <span class="font-bold">${yourCombined.toFixed(2)}</span> <span class="text-gray-600">(Avg: ${yourCombinedClass.toFixed(2)})</span></span>
                                </div>`;
                        
                        if (hasPeer) {
                            const theirCombinedClass = getCombined(otherLectClass, otherLabClass, ch);
                            const totalCombinedAvg = (yourCombinedClass + theirCombinedClass) / 2;
                            html += `
                                <div class="flex justify-between text-sm mt-2 text-purple-900 bg-purple-50 p-2 rounded font-medium">
                                    <span>TOTAL COMBINED AVG: ${totalCombinedAvg.toFixed(2)}</span>
                                </div>`;
                        }
                    } else {
                        if (hasPeer) {
                            const combinedAvg = (yourLectClass + otherLectClass) / 2;
                            html += `
                                <div class="flex justify-between text-sm text-purple-900 bg-purple-50 p-2 rounded font-medium">
                                    <span>COMBINED AVG: ${combinedAvg.toFixed(2)}</span>
                                </div>`;
                        }
                    }

                    html += `</div></div></div>`;
                    coursesList.insertAdjacentHTML('beforeend', html);
                });

                resultsContainer.classList.remove('hidden');

            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Calculate Aggregates';
                btnLoader.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
